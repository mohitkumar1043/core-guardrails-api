server:
  port: 8080

spring:
  application:
    name: guardrails-system

  datasource:
    url: jdbc:postgresql://localhost:5432/guardrails_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
   
  data:
    redis:
      host: localhost
      port: 6379
