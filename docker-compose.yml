
services:

  postgres:
    image: postgres:15
    container_name: guardrails-postgres
    restart: always
    environment:
      POSTGRES_DB: guardrails_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: guardrails-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: